<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'nonce-{{nonce}}' {{cspSource}}; style-src 'nonce-{{nonce}}' {{cspSource}}; connect-src https://api.vapi.ai wss://api.vapi.ai; img-src {{cspSource}} https: data:; media-src {{cspSource}} blob: data:; worker-src {{cspSource}} blob:;"
  />
  <title>PairVoice</title>
  <style nonce="{{nonce}}">
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --panel: #1f1f1f;
      --primary: #8ee58f;
      --danger: #ff8b8b;
      --muted: #8a8d93;
      --border: rgba(255, 255, 255, 0.08);
      font-family: var(--vscode-font-family, 'Segoe UI', system-ui, sans-serif);
    }
    * {
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--primary);
      margin: 0;
      padding: 16px;
      min-width: 320px;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mic-control {
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 8px;
    }
    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--primary);
      font-size: 26px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s;
    }
    .mic-btn.listening {
      background: rgba(142, 229, 143, 0.1);
      transform: scale(1.05);
    }
    .listening-indicator {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(142, 229, 143, 0.4);
      position: relative;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .listening-indicator.active {
      opacity: 1;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(142, 229, 143, 0.8);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(142, 229, 143, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(142, 229, 143, 0);
      }
    }
    .shortcut {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .panel-section {
      background: var(--panel);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid var(--border);
    }
    .panel-header {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .kb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .kb-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .transcript,
    .response {
      min-height: 60px;
      font-size: 13px;
      color: #ffffff;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .diff-panel {
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .diff-panel.hidden {
      display: none;
    }
    .diff-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: #c5c5c5;
    }
    .diff-actions {
      display: flex;
      gap: 6px;
    }
    .btn {
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--primary);
      cursor: pointer;
    }
    .btn.secondary {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.1);
      background: transparent;
    }
    .diff-body {
      max-height: 400px;
      overflow-y: auto;
      font-family: var(--vscode-editor-font-family, 'Fira Code', 'Consolas', monospace);
      font-size: 12px;
      line-height: 1.3;
    }
    .diff-row {
      display: grid;
      grid-template-columns: 50px 1fr;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .diff-row.context {
      background: transparent;
    }
    .diff-row.add {
      background: #1a3a1a;
      color: #9ceb9c;
    }
    .diff-row.del {
      background: #3a1a1a;
      color: #ffb2b2;
    }
    .line-number {
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      justify-self: flex-end;
      padding-right: 8px;
    }
    .diff-row span {
      overflow-wrap: anywhere;
    }
    .kb-section .kb-source {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: #d1d1d1;
    }
    .kb-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 12px;
      background: rgba(142, 229, 143, 0.1);
      color: var(--primary);
    }
    .error {
      color: #ff8b8b;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="status">
      <span id="status">Ready — press Ctrl+Shift+V to speak</span>
      <span id="statusHelper"></span>
    </div>

    <div class="mic-control">
      <button class="mic-btn" id="micBtn" title="Start / stop PairVoice">🎤</button>
      <div class="listening-indicator" id="listeningIndicator"></div>
    </div>
    <div class="shortcut">Ctrl+Shift+V / Cmd+Shift+V</div>

    <section class="panel-section">
      <div class="panel-header">You said</div>
      <p class="transcript" id="transcript">Waiting for your prompt...</p>
    </section>

    <section class="panel-section">
      <div class="panel-header">Agent response</div>
      <p class="response" id="response">Speak naturally — ask about code, files, tests, PRs, or say "fix this bug."</p>
    </section>

    <section class="diff-panel hidden" id="diffPanel">
      <div class="diff-header">
        <div>File: <span id="diffFile">unknown</span></div>
        <div class="diff-actions">
          <button class="btn" id="applyBtn">Apply Fix</button>
          <button class="btn secondary" id="rejectBtn">Reject</button>
        </div>
      </div>
      <div class="diff-body" id="diffBody"></div>
    </section>

    <section class="panel-section kb-section">
      <div class="panel-header kb-header">
        <span>Knowledge sources</span>
        <div class="kb-actions">
          <button class="btn secondary" id="attachBtn" title="Attach a document (PDF/MD/TXT/HTML) for indexing">Add File</button>
          <button class="btn secondary" id="addUrlBtn" title="Index a knowledge URL">Add Link</button>
          <button class="btn secondary" id="indexBtn" title="Index the active workspace">Index</button>
        </div>
      </div>
      <div id="kbSources">
        <div class="kb-source">
          <span>Workspace (not indexed)</span>
          <span class="kb-badge">—</span>
        </div>
      </div>
    </section>
  </div>

  <script nonce="{{nonce}}" src="{{vapiScript}}"></script>
  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const micBtn = document.getElementById('micBtn');
    const listeningIndicator = document.getElementById('listeningIndicator');
    const statusEl = document.getElementById('status');
    const statusHelper = document.getElementById('statusHelper');
    const transcriptEl = document.getElementById('transcript');
    const responseEl = document.getElementById('response');
    const diffPanel = document.getElementById('diffPanel');
    const diffBody = document.getElementById('diffBody');
    const diffFile = document.getElementById('diffFile');
    const applyBtn = document.getElementById('applyBtn');
    const rejectBtn = document.getElementById('rejectBtn');
    const kbSources = document.getElementById('kbSources');
    const indexBtn = document.getElementById('indexBtn');
    const attachBtn = document.getElementById('attachBtn');
    const addUrlBtn = document.getElementById('addUrlBtn');

    let vapiClient = null;
    let currentPublicKey = '';
    let currentAssistantId = '';
    let pendingDiff = null;
    let listening = false;
    let eventsBound = false;

    indexBtn.addEventListener('click', () => {
      vscode.postMessage({ type: 'indexWorkspace' });
      showStatus('Indexing workspace…');
    });

    attachBtn.addEventListener('click', () => {
      vscode.postMessage({ type: 'attachDocument' });
      showStatus('Select documents to index…');
    });

    addUrlBtn.addEventListener('click', () => {
      const url = prompt('Paste a URL to index into knowledge sources (Confluence/Docs/etc):');
      if (!url) return;
      vscode.postMessage({ type: 'indexUrl', url: url.trim() });
      showStatus('Indexing URL…');
    });

    micBtn.addEventListener('click', () => {
      if (listening) {
        vscode.postMessage({ type: 'stopVoice' });
        setMicState(false);
      } else {
        vscode.postMessage({ type: 'startVoice' });
        setMicState(true);
      }
    });

    applyBtn.addEventListener('click', () => {
      if (pendingDiff) {
        vscode.postMessage({
          type: 'applyFix',
          filePath: pendingDiff.filePath,
          newContent: pendingDiff.newContent
        });
        hideDiff();
      }
    });

    rejectBtn.addEventListener('click', () => {
      hideDiff();
    });

    function setMicState(active) {
      listening = active;
      micBtn.classList.toggle('listening', active);
      micBtn.textContent = active ? '⏹' : '🎤';
      listeningIndicator.classList.toggle('active', active);
      statusEl.textContent = active ? 'Listening for your voice...' : 'Ready';
    }

    function showStatus(text, severity = 'info') {
      statusEl.textContent = text;
      statusHelper.textContent = '';
      if (severity === 'error') {
        statusEl.classList.add('error');
      } else {
        statusEl.classList.remove('error');
      }
    }

    function isVsCodeWebview() {
      // In VS Code webviews, mic permissions are blocked by the iframe sandbox / permissions policy.
      return typeof acquireVsCodeApi === 'function' && location.protocol === 'vscode-webview:';
    }

    async function ensureMicrophoneAccess() {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        return true;
      } catch (err) {
        if (isVsCodeWebview()) {
          showStatus('Microphone is not available inside VS Code webviews. Opening a browser voice session…', 'error');
          vscode.postMessage({ type: 'openVoiceInBrowser' });
          return false;
        }
        showStatus('Microphone access denied. Grant permission to continue.', 'error');
        vscode.postMessage({ type: 'error', text: 'Microphone permission denied' });
        return false;
      }
    }

    function attachVapiEvents() {
      if (!vapiClient || eventsBound) return;
      eventsBound = true;

      vapiClient.on('speech-start', () => {
        showStatus('Listening...');
        setMicState(true);
      });

      vapiClient.on('speech-end', () => {
        showStatus('Processing your request...');
        listeningIndicator.classList.remove('active');
      });

      vapiClient.on('message', (msg) => {
        if (msg.type === 'transcript') {
          transcriptEl.textContent = msg.transcript || msg.text || '';
        }
        if (msg.type === 'function-call') {
          vscode.postMessage({ type: 'functionCall', payload: msg });
        }
      });

      vapiClient.on('call-end', () => {
        setMicState(false);
        showStatus('Ready — say something to keep coding.');
      });

      vapiClient.on('error', (error) => {
        const message = (error && error.message) || 'Unknown Vapi error';
        showStatus(`Vapi error: ${message}`, 'error');
        vscode.postMessage({ type: 'error', text: message });
      });
    }

    function initVapi(publicKey) {
      if (!window.Vapi) {
        showStatus('Vapi Web SDK failed to load.', 'error');
        return null;
      }
      if (!vapiClient || currentPublicKey !== publicKey) {
        currentPublicKey = publicKey;
        vapiClient = new Vapi(publicKey);
        eventsBound = false;
        attachVapiEvents();
      }
      return vapiClient;
    }

    async function startVapiCall(payload) {
      if (!payload?.vapiPublicKey || !payload?.assistantId) {
        showStatus('Missing Vapi credentials.', 'error');
        return;
      }
      currentAssistantId = payload.assistantId;
      if (isVsCodeWebview()) {
        // Do not even try getUserMedia in a VS Code webview; it will be blocked by policy.
        showStatus('Opening a browser voice session…');
        vscode.postMessage({ type: 'openVoiceInBrowser' });
        return;
      }
      const client = initVapi(payload.vapiPublicKey);
      if (!client) return;
      const ok = await ensureMicrophoneAccess();
      if (!ok) {
        setMicState(false);
        return;
      }
      client.start(currentAssistantId, {
        variableValues: payload.context || {}
      });
      showStatus('Starting voice session…');
    }

    function stopVapiCall() {
      if (vapiClient?.stop) {
        vapiClient.stop();
      } else if (vapiClient?.stopCall) {
        vapiClient.stopCall();
      }
      setMicState(false);
      showStatus('Voice session stopped.');
    }

    function showDiff(diff) {
      pendingDiff = diff;
      diffFile.textContent = diff.filePath || 'unknown file';
      diffBody.innerHTML = '';
      parseDiff(diff.diff || '');
      diffPanel.classList.remove('hidden');
    }

    function hideDiff() {
      pendingDiff = null;
      diffPanel.classList.add('hidden');
      diffBody.innerHTML = '';
    }

    function parseDiff(diffText) {
      const lines = diffText.split('\\n');
      let oldLine = 0;
      let newLine = 0;
      lines.forEach((line) => {
        if (line.startsWith('@@')) {
          const match = line.match(/@@ -(\\d+)(?:,\\d+)? \\+(\\d+)(?:,\\d+)? @@/);
      if (match) {
        oldLine = parseInt(match[1], 10) - 1;
        newLine = parseInt(match[2], 10) - 1;
      }
          return;
        }

        if (line.startsWith('---') || line.startsWith('+++')) {
          return;
        }

        let type = 'context';
        let displayText = line;
        if (line.startsWith('+')) {
          type = 'add';
          displayText = line.slice(1);
          newLine += 1;
        } else if (line.startsWith('-')) {
          type = 'del';
          displayText = line.slice(1);
          oldLine += 1;
        } else {
          oldLine += 1;
          newLine += 1;
        }

        const row = document.createElement('div');
        row.className = `diff-row ${type}`;
        const numberSpan = document.createElement('span');
        numberSpan.className = 'line-number';
        if (type === 'add') {
          numberSpan.textContent = newLine.toString();
        } else if (type === 'del') {
          numberSpan.textContent = oldLine.toString();
        } else {
          numberSpan.textContent = `${oldLine}/${newLine}`;
        }
        const textSpan = document.createElement('span');
        textSpan.textContent = displayText || ' ';
        row.appendChild(numberSpan);
        row.appendChild(textSpan);
        diffBody.appendChild(row);
      });
    }

    function updateKnowledgeSources(sources = []) {
      if (!Array.isArray(sources)) return;
      kbSources.innerHTML = sources
        .map((s) => {
          return `
            <div class="kb-source">
              <span>${s.name}</span>
              <span class="kb-badge">${s.chunks || '0'} chunks</span>
            </div>
          `;
        })
        .join('');
    }

    window.addEventListener('message', async (event) => {
      const msg = event.data;
      switch (msg.type) {
        case 'startVapiCall':
          await startVapiCall(msg);
          break;
        case 'stopVapiCall':
          stopVapiCall();
          break;
        case 'response':
          responseEl.textContent = msg.text;
          break;
        case 'transcript':
          transcriptEl.textContent = msg.text;
          break;
        case 'status':
          showStatus(msg.text || ' ');
          break;
        case 'showDiff':
          showDiff(msg);
          break;
        case 'indexStatus':
          updateKnowledgeSources(msg.sources || []);
          break;
        case 'error':
          showStatus(msg.text || 'An error occurred.', 'error');
          break;
      }
    });
  </script>
</body>
</html>
